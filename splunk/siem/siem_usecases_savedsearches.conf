# =============================================================================
# UC-BANK-003: Network Reconnaissance Detection
# Erkennt Netzwerk-Scanning, Host-Discovery, Domain-Enumeration
# MITRE: T1016, T1018, T1049, T1057, T1082, T1083, T1087, T1482
# Schweregrad: MEDIUM (einzeln), HIGH (kumuliert)
# =============================================================================
[UC-BANK-003 - Network Reconnaissance Detection]
description = [HIGH] Erkennung von Netzwerk-Aufklaerungsaktivitaeten. MITRE T1016-T1087/T1482. DORA Art.25.
search = index=caldera sourcetype="caldera:command:enriched" \
  (technique_id="T1016*" OR technique_id="T1018*" OR technique_id="T1049*" \
   OR technique_id="T1057*" OR technique_id="T1082*" OR technique_id="T1083*" \
   OR technique_id="T1087*" OR technique_id="T1482*") \
  OR (command_decoded="*arp*" OR command_decoded="*nslookup*" OR command_decoded="*netstat*" \
      OR command_decoded="*systeminfo*" OR command_decoded="*whoami*" OR command_decoded="*net user*" \
      OR command_decoded="*net group*" OR command_decoded="*nltest*" OR command_decoded="*dsquery*") \
  | lookup mitre_attack_bank_mapping technique_id OUTPUT technique_name tactic severity siem_usecase_name dora_article description_de \
  | bin _time span=10m \
  | stats count as recon_count dc(technique_id) as technique_diversity values(technique_id) as techniques values(ability_name) as abilities by _time operation_name paw host \
  | where recon_count >= 3 OR technique_diversity >= 2 \
  | eval alert_severity=if(technique_diversity>=4, "critical", if(technique_diversity>=2, "high", "medium")) \
  | eval usecase_id="UC-BANK-003" \
  | eval usecase_name="Network Reconnaissance Detection" \
  | eval bank_risk="Angreifer kartiert Banknetzwerk - Vorbereitung auf Lateral Movement oder Datendiebstahl" \
  | collect index=siem_summary sourcetype="siem:usecase:triggered" marker="usecase_id=UC-BANK-003"
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 4
counttype = number of events
quantity = 0
relation = greater than
disabled = 0

