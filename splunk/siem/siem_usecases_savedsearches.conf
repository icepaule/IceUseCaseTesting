[UC-BANK-012 - Ransomware Detection]
description = [CRITICAL] Erkennung von Ransomware-Aktivitaeten. MITRE T1486/T1489/T1491. DORA Art.25.
search = index=caldera sourcetype="caldera:command:enriched" \
  (technique_id="T1486*" OR technique_id="T1489*" OR technique_id="T1491*") \
  OR (command_decoded="*encrypt*" OR command_decoded="*ransom*" OR command_decoded="*vssadmin*delete*" \
      OR command_decoded="*bcdedit*" OR command_decoded="*wbadmin*delete*" \
      OR command_decoded="*stop-service*" OR command_decoded="*note*" OR command_decoded="*README*") \
  | lookup mitre_attack_bank_mapping technique_id OUTPUT technique_name tactic severity siem_usecase_name description_de \
  | eval alert_severity="critical" \
  | eval usecase_id="UC-BANK-012" \
  | eval usecase_name="Ransomware Detection" \
  | eval bank_risk="HOECHSTE PRIORITAET: Ransomware-Aktivitaet auf Bankinfrastruktur" \
  | eval compliance="DORA Art.19: Sofortige Meldung an BaFin/EZB, Art.17: IKT-bezogene Vorfaelle" \
  | table _time operation_name paw host ability_name technique_id technique_name command_decoded alert_severity usecase_id usecase_name bank_risk compliance \
  | collect index=siem_summary sourcetype="siem:usecase:triggered" marker="usecase_id=UC-BANK-012"
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 5
counttype = number of events
quantity = 0
relation = greater than
disabled = 0

