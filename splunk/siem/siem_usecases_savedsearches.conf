# =============================================================================
# UC-BANK-014: System Impact Detection
# Erkennt destruktive Aktivitaeten (Shutdown, Datenzerstoerung, Manipulation)
# MITRE: T1499, T1565, T1565.001
# Schweregrad: CRITICAL
# =============================================================================
[UC-BANK-014 - System Impact Detection]
description = [CRITICAL] Erkennung von destruktiven Aktivitaeten. MITRE T1499/T1565. DORA Art.25.
search = index=caldera sourcetype="caldera:command:enriched" \
  (technique_id="T1499*" OR technique_id="T1565*") \
  OR (command_decoded="*shutdown*" OR command_decoded="*halt*" OR command_decoded="*kill*" \
      OR command_decoded="*rm -rf*" OR command_decoded="*del /f*" OR command_decoded="*format*" \
      OR command_decoded="*dd if=/dev/zero*") \
  | lookup mitre_attack_bank_mapping technique_id OUTPUT technique_name tactic severity siem_usecase_name description_de \
  | eval alert_severity="critical" \
  | eval usecase_id="UC-BANK-014" \
  | eval usecase_name="System Impact Detection" \
  | eval bank_risk="Destruktive Aktion auf Bankinfrastruktur - Business Continuity gefaehrdet" \
  | table _time operation_name paw host ability_name technique_id technique_name command_decoded alert_severity usecase_id usecase_name bank_risk \
  | collect index=siem_summary sourcetype="siem:usecase:triggered" marker="usecase_id=UC-BANK-014"
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 5
counttype = number of events
quantity = 0
relation = greater than
disabled = 0

# =============================================================================
# UC-BANK-015: Kill Chain Correlation (Meta-UseCase)
# Korreliert mehrere UseCases zu einer vollstaendigen Angriffskette
# Erkennt wenn ein Angreifer mehrere Phasen der Kill Chain durchlaeuft
# Schweregrad: CRITICAL
# =============================================================================
[UC-BANK-015 - Kill Chain Correlation]
description = [CRITICAL] Meta-Korrelation: Erkennt vollstaendige Angriffsketten ueber mehrere SIEM-UseCases. DORA Art.25/26.
search = index=siem_summary sourcetype="siem:usecase:triggered" \
  | rex field=_raw "usecase_id=(?<triggered_usecase>UC-BANK-\d+)" \
  | bin _time span=30m \
  | stats dc(triggered_usecase) as usecase_count values(triggered_usecase) as triggered_usecases values(usecase_name) as usecase_names values(technique_id) as kill_chain_techniques by _time host operation_name \
  | where usecase_count >= 3 \
  | eval kill_chain_phase=case( \
      match(mvjoin(triggered_usecases,","), "UC-BANK-003") AND match(mvjoin(triggered_usecases,","), "UC-BANK-001") AND match(mvjoin(triggered_usecases,","), "UC-BANK-004"), "Full Kill Chain: Recon→Credentials→LateralMovement", \
      match(mvjoin(triggered_usecases,","), "UC-BANK-001") AND match(mvjoin(triggered_usecases,","), "UC-BANK-006"), "Data Breach Chain: Credentials→Exfiltration", \
      match(mvjoin(triggered_usecases,","), "UC-BANK-007") AND match(mvjoin(triggered_usecases,","), "UC-BANK-012"), "Ransomware Chain: Evasion→Ransomware", \
      match(mvjoin(triggered_usecases,","), "UC-BANK-010") AND match(mvjoin(triggered_usecases,","), "UC-BANK-006"), "Insider Threat Chain: DataAccess→Exfiltration", \
      1=1, "Multi-Phase Attack: ".mvjoin(triggered_usecases, "→")) \
  | eval alert_severity="critical" \
  | eval usecase_id="UC-BANK-015" \
  | eval usecase_name="Kill Chain Correlation" \
  | eval bank_risk="HOECHSTE ESKALATION: Mehrphasiger Angriff auf Bankinfrastruktur erkannt" \
  | eval response="Sofort: CSIRT aktivieren, Systemisolierung, BaFin-Meldung vorbereiten" \
  | collect index=siem_summary sourcetype="siem:usecase:killchain" marker="usecase_id=UC-BANK-015"
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
alert.severity = 5
counttype = number of events
quantity = 0
relation = greater than
disabled = 0
