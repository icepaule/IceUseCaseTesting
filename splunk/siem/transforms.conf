# =============================================================================
# Splunk Transforms fuer Caldera Bank SIEM Lookups
# Installation: $SPLUNK_HOME/etc/apps/caldera_bank_siem/local/transforms.conf
# =============================================================================

[mitre_attack_bank_mapping]
filename = mitre_attack_bank_mapping.csv
case_sensitive_match = false
max_matches = 1
default_match = unknown
match_type = WILDCARD(technique_id)

[caldera_usecase_status]
filename = caldera_usecase_status.csv
case_sensitive_match = false
