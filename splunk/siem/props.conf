# =============================================================================
# Splunk Props fuer Caldera Event-Typen
# Installation: $SPLUNK_HOME/etc/apps/caldera_bank_siem/local/props.conf
# =============================================================================

[caldera:command:enriched]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = false
KV_MODE = json
LOOKUP-mitre_mapping = mitre_attack_bank_mapping technique_id OUTPUT technique_name tactic severity bank_relevance siem_usecase_id siem_usecase_name dora_article tiber_phase description_de

[caldera:agent]
SHOULD_LINEMERGE = false
KV_MODE = json

[caldera:operation]
SHOULD_LINEMERGE = false
KV_MODE = json

[siem:usecase:triggered]
SHOULD_LINEMERGE = false
KV_MODE = json

[siem:caldera:summary]
SHOULD_LINEMERGE = false
KV_MODE = json

[siem:usecase:killchain]
SHOULD_LINEMERGE = false
KV_MODE = json
