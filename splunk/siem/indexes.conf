# =============================================================================
# Splunk Index-Konfiguration fuer Caldera Bank SIEM
# Installation: $SPLUNK_HOME/etc/apps/caldera_bank_siem/local/indexes.conf
# =============================================================================

[caldera]
homePath   = $SPLUNK_DB/caldera/db
coldPath   = $SPLUNK_DB/caldera/colddb
thawedPath = $SPLUNK_DB/caldera/thaweddb
maxTotalDataSizeMB = 10240
frozenTimePeriodInSecs = 7776000

[siem_summary]
homePath   = $SPLUNK_DB/siem_summary/db
coldPath   = $SPLUNK_DB/siem_summary/colddb
thawedPath = $SPLUNK_DB/siem_summary/thaweddb
maxTotalDataSizeMB = 5120
frozenTimePeriodInSecs = 15552000
datatype = event
